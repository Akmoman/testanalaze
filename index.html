    <!-- خط تجوال العربي -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc;

        /* تخصيص شريط التمرير */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .thead-sticky-col-1 { position: sticky; right: 0; z-index: 30; background-color: #f1f5f9; }
        .thead-sticky-col-2 { position: sticky; right: 40px; z-index: 30; background-color: #f1f5f9; box-shadow: -2px 0 5px -2px rgba(0,0,0,0.1); }

        /* ======== التنسيقات الشاملة للطباعة (A4) ======== */
        @media print {
            @page { margin: 10mm; size: A4 portrait; }
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            body, html { 
                background: white !important; 
                font-size: 11pt !important;
                color: #000 !important;
                height: 100% !important;
            }
            
            /* إلغاء الاقتطاع والاختفاء للأقسام */
            body, main, div, table, tbody, tr, td, th, .overflow-x-auto, .overflow-auto {
                overflow: visible !important;
            }

            /* إخفاء واجهات الاستخدام والأزرار */
            header, footer, button, .no-print, input[type="file"], select, .tabs-nav { 
                display: none !important; 
            }
            
            /* فواصل الصفحات لمنع قسمة الجداول أو الرسومات */
            .print-break-avoid { break-inside: avoid !important; page-break-inside: avoid !important; }
            .page-break { page-break-before: always !important; }
            h1, h2, h3 { color: #000 !important; page-break-after: avoid !important; }
            
            /* تنسيق حقول النصوص لضمان ظهور النص كاملاً */
            input[type="text"], textarea { 
                border: none !important;

                padding: 0 !important; 
                font-family: inherit !important; 
                overflow: hidden !important; 
                white-space: pre-wrap !important;
                word-wrap: break-word !important;
                color: #000 !important;
                height: auto !important;

            /* تنسيق الجداول لتناسب عرض A4 */
            table { 
                border-collapse: collapse !important; 
                width: 100% !important; 
                table-layout: fixed !important; 
            }
            th, td { 
                border: 1px solid #000 !important; 
                padding: 6px !important; 
                word-wrap: break-word !important; 
            }
            th { background-color: #f1f5f9 !important; font-weight: bold !important; color: #000 !important; }
            
            /* إصلاحات الرسوم البيانية في الطباعة */

            .recharts-surface { overflow: visible !important; width: 100% !important; }
            .recharts-responsive-container { height: 320px !important; width: 100% !important; }
            
            .chart-box { page-break-inside: avoid !important; break-inside: avoid !important; display: block !important; margin-bottom: 20px !important; }

            .shadow-sm, .shadow-md, .shadow-lg, .shadow-xl { box-shadow: none !important; }

        .modal-overlay { background-color: rgba(0, 0, 0, 0.5); position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; z-index: 50; }

<body>

    <script type="text/babel">

        const RechartsLib = window.Recharts || {};
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, AreaChart, Area, PieChart, Pie, Cell } = RechartsLib;

        // --- أيقونات SVG ---
        const Icons = {
            Table: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v18"/><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/></svg>,
            RefreshCw: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>,
            Trash2: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
            Calculator: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>,
            FileText: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>,
            Printer: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>,
            TrendingUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
            Award: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>,
            Sigma: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 7V4H6l6 8-6 8h12v-3"/></svg>,
            ArrowDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>,
            ArrowUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>,
            PenLine: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>,
            Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            Upload: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>,
            Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
            Star: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
            Folder: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            SortAsc: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 11h6"/><path d="M11 15h4"/><path d="M11 19h2"/><path d="M11 7h8"/><path d="M5 19V5l-3 3"/><path d="m8 8-3-3"/></svg>,
            FileSpreadsheet: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M8 13h2"/><path d="M14 13h2"/><path d="M8 17h2"/><path d="M14 17h2"/></svg>
        };

        const SOCIAL_STUDIES_CONTENT = {
            objectives: ["تحديد المواقع الجغرافية على الخريطة بدقة.", "تفسير الظواهر الطبيعية والبشرية.", "مقارنة الأحداث التاريخية واستنتاج العبر.", "تحليل النصوص والوثائق التاريخية.", "استنتاج العلاقة بين البيئة وأنشطة الإنسان.", "تطبيق المفاهيم الجغرافية على مواقف حياتية.", "تقدير دور الشخصيات العمانية في التاريخ.", "استخدام الأدوات الجغرافية (الصور، الجداول) في التحليل."],
            cognitive: ["المعرفة (تذكر)", "الفهم والتطبيق", "القدرات العليا"],
            reasons: ["ضعف في مهارة قراءة وتفسير الخرائط.", "الخلط بين المفاهيم والمصطلحات المتشابهة.", "صعوبة في ربط الأحداث التاريخية بالتسلسل الزمني.", "الاعتماد على الحفظ دون الفهم والاستيعاب.", "ضعف في القدرة على استنتاج العلاقات السببية.", "عدم التركيز في قراءة المطلوب من السؤال.", "صعوبة التعامل مع الرسوم البيانية والجداول الإحصائية."],
            plans: ["تكثيف التدريبات العملية على قراءة ورسم الخرائط.", "استخدام خرائط المفاهيم لتوضيح العلاقات بين المصطلحات.", "تصميم خطوط زمنية (Timelines) لترتيب الأحداث.", "تفعيل استراتيجيات التعلم النشط (الحوار، المناقشة).", "تدريب الطلاب على تحليل الأسئلة واستخراج المعطيات.", "عرض نماذج لأسئلة مشابهة وحلها جماعياً.", "استخدام الوسائل البصرية (صور، فيديوهات) لتبسيط المفاهيم."]
        };

        const DEFAULT_STUDENTS_COUNT = 100;
        const QUESTIONS_COUNT = 60; 

        // --- الدوال المساعدة ---
        const getGradeLevel = (score, totalScore) => {
            if (totalScore === 0) return { label: '-', color: 'bg-slate-100 text-slate-500', chartColor: '#cbd5e1' };
            const percentage = (score / totalScore) * 100;
            if (percentage >= 87.5) return { label: 'ممتاز', range: '87.5% - 100%', color: 'bg-emerald-100 text-emerald-700', chartColor: '#10B981' };
            if (percentage >= 75) return { label: 'جيد جداً', range: '75% - 87.5%', color: 'bg-blue-100 text-blue-700', chartColor: '#3B82F6' };
            if (percentage >= 62.5) return { label: 'جيد', range: '62.5% - 75%', color: 'bg-indigo-100 text-indigo-700', chartColor: '#6366F1' };
            if (percentage >= 50) return { label: 'مقبول', range: '50% - 62.5%', color: 'bg-yellow-100 text-yellow-700', chartColor: '#F59E0B' };
            return { label: 'راسب', range: 'أقل من 50%', color: 'bg-red-100 text-red-700', chartColor: '#EF4444' };
        };

        const calculateMedian = (values) => {
            if (values.length === 0) return 0;
            const sorted = [...values].sort((a, b) => a - b);
            const mid = Math.floor(sorted.length / 2);
            return sorted.length % 2 !== 0 ? sorted[mid] : ((sorted[mid - 1] + sorted[mid]) / 2);
        };

        const calculateMode = (values) => {
            if (values.length === 0) return 'لا يوجد';
            const frequency = {};
            let maxFreq = 0;
            let modes = [];
            values.forEach(v => {
                frequency[v] = (frequency[v] || 0) + 1;
                if (frequency[v] > maxFreq) maxFreq = frequency[v];
            });
            if (maxFreq === 1) return 'لا يوجد';
            for (const key in frequency) { if (frequency[key] === maxFreq) modes.push(key); }
            return modes.length > 3 ? 'متعدد' : modes.join(', ');
        };

        const calculateStdDev = (values, mean) => {
            if (values.length === 0) return 0;
            const squareDiffs = values.map(value => Math.pow(value - mean, 2));
            const avgSquareDiff = squareDiffs.reduce((a, b) => a + b, 0) / values.length;
            return Math.sqrt(avgSquareDiff).toFixed(2);
        };

        const generateInitialData = (count) => {
            return Array.from({ length: count }, (_, i) => {
                const student = { id: i + 1, name: `طالب ${i + 1}` };
                for (let q = 1; q <= QUESTIONS_COUNT; q++) { student[`q${q}`] = 0; }
                return student;
            });
        };

        const initialMaxScores = Array(QUESTIONS_COUNT).fill(1); 

        // --- المكونات ---
        const StatCard = ({ title, value, subtext, color, icon: Icon }) => (
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 print-break-avoid">
                <div className="flex justify-between items-start">
                    <div>
                        <p className="text-sm font-medium text-slate-500 print:text-black">{title}</p>
                        <h3 className="text-2xl font-bold text-slate-800 mt-1 print:text-black">{value}</h3>
                    </div>
                    <div className={`p-2 rounded-lg ${color} text-white print:text-black print:bg-transparent`}><Icon /></div>
                </div>
                {subtext && <p className="text-xs text-slate-400 mt-2 print:text-gray-600">{subtext}</p>}
            </div>
        );

        const RenderField = ({ qKey, field, options, placeholder, value, onChange }) => {
            const textareaRef = useRef(null);

            // تمديد الحقل تلقائياً بناءً على النص (في الشاشة)
            const resizeTextarea = () => {
                if (textareaRef.current) {
                    textareaRef.current.style.height = 'auto';
                    textareaRef.current.style.height = textareaRef.current.scrollHeight + 'px';
                }
            };

            useEffect(() => {
                resizeTextarea();
            }, [value]);

            return (
                <div className="flex flex-col gap-1 h-full">
                    <select 
                        className="text-[10px] p-1 border rounded bg-slate-50 text-slate-500 no-print cursor-pointer hover:bg-slate-100"
                        onChange={(e) => { if(e.target.value) onChange(qKey, field, e.target.value); }}
                        value=""
                    >
                        <option value="" disabled>تعبئة سريعة...</option>
                        {options.map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
                    </select>
                    {/* هذا المربع يظهر في الشاشة فقط للتحرير */}
                    <textarea 
                        ref={textareaRef}
                        className="w-full min-h-[60px] p-1 resize-none focus:outline-none focus:bg-blue-50 bg-transparent text-sm overflow-hidden print:hidden"
                        placeholder={placeholder} value={value || ''}
                        onChange={(e) => onChange(qKey, field, e.target.value)}
                    />
                    {/* هذا العنصر يظهر في الطباعة فقط لضمان ظهور النص كاملاً كفقرة */}
                    <div className="hidden print:block w-full text-sm whitespace-pre-wrap break-words text-right p-1 min-h-[60px]">
                        {value || ''}
                    </div>
                </div>
            );
        };

        const ItemAnalysisForm = ({ hardestQuestions, formInputs, handleInputChange, handleItemChange }) => {
            const questionsToShow = useMemo(() => hardestQuestions.slice(0, 5), [hardestQuestions]);

            return (
                <div className="mt-8 bg-white p-6 rounded-xl shadow-sm border border-slate-200 print-break-avoid page-break">
                    <h2 className="text-2xl font-bold text-center mb-6 text-slate-800 print:text-black border-b pb-2">
                        استمارة تفريغ تحليل أداء الطلاب في مفردات الورقة الامتحانية
                    </h2>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 print:grid-cols-3 print:gap-4 text-sm">
                        <div className="flex items-center gap-2"><span className="font-bold text-slate-700 print:text-black">اسم المدرسة:</span><input type="text" className="border-b border-slate-300 focus:outline-none focus:border-blue-500 px-2 py-1 w-full print:border-b-black" value={formInputs.school} onChange={(e) => handleInputChange(e, 'school')} placeholder="......................." /></div>
                        <div className="flex items-center gap-2"><span className="font-bold text-slate-700 print:text-black">المادة:</span><input type="text" className="border-b border-slate-300 focus:outline-none focus:border-blue-500 px-2 py-1 w-full print:border-b-black" value={formInputs.subject} onChange={(e) => handleInputChange(e, 'subject')} placeholder="......................." /></div>
                        <div className="flex items-center gap-2"><span className="font-bold text-slate-700 print:text-black">الصف:</span><input type="text" className="border-b border-slate-300 focus:outline-none focus:border-blue-500 px-2 py-1 w-full print:border-b-black" value={formInputs.grade} onChange={(e) => handleInputChange(e, 'grade')} placeholder="......................." /></div>
                    </div>

                    <div className="w-full">
                        {/* استخدام table-fixed لمنع تجاوز الجدول للصفحة */}
                        <table className="w-full border-collapse border border-slate-300 print:border-black text-sm text-center print:table-fixed">
                            <thead className="bg-slate-50 print:bg-gray-100 text-slate-800 font-bold">
                                <tr>

        const StatisticsTables = ({ stats, totalScore }) => {
            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 print:grid-cols-2 print:gap-4 mb-6 print-break-avoid">
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                        <h3 className="text-lg font-bold text-slate-800 mb-3 border-b pb-2 flex items-center gap-2 print:text-black">جدول المؤشرات العامة</h3>
                        <table className="w-full text-sm text-center border-collapse">
                            <tbody>
                                <tr className="border-b border-slate-100 print:border-gray-300"><td className="p-2 font-bold bg-slate-50 w-1/2 text-right pr-4">عدد الطلاب (المحلل)</td><td className="p-2 text-blue-700 font-bold print:text-black">{stats.actualStudentCount}</td></tr>
                                <tr className="border-b border-slate-100 print:border-gray-300"><td className="p-2 font-bold bg-slate-50 text-right pr-4">الدرجة الكلية</td><td className="p-2 text-slate-700 print:text-black">{totalScore}</td></tr>
                                <tr className="border-b border-slate-100 print:border-gray-300"><td className="p-2 font-bold bg-slate-50 text-right pr-4">المتوسط الحسابي</td><td className="p-2 text-slate-700 print:text-black">{stats.avgTotal}</td></tr>
                                <tr className="border-b border-slate-100 print:border-gray-300"><td className="p-2 font-bold bg-slate-50 text-right pr-4">أعلى درجة</td><td className="p-2 text-green-600 font-bold print:text-black">{stats.maxScore}</td></tr>
                                <tr className="border-b border-slate-100 print:border-gray-300"><td className="p-2 font-bold bg-slate-50 text-right pr-4">أدنى درجة</td><td className="p-2 text-red-600 font-bold print:text-black">{stats.minScore}</td></tr>
                                <tr className="border-b border-slate-100 print:border-gray-300"><td className="p-2 font-bold bg-slate-50 text-right pr-4">نسبة النجاح</td><td className="p-2 text-blue-600 font-bold print:text-black">{stats.passRate}%</td></tr>
                                <tr><td className="p-2 font-bold bg-slate-50 text-right pr-4">نسبة الإتقان</td><td className="p-2 text-yellow-600 font-bold print:text-black">{stats.masteryRate}%</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                        <h3 className="text-lg font-bold text-slate-800 mb-3 border-b pb-2 flex items-center gap-2 print:text-black">جدول توزيع مستويات التحصيل</h3>
                        <table className="w-full text-sm text-center border-collapse">
                            <thead className="bg-slate-50 text-slate-700 font-bold">
                                <tr><th className="p-2 border-b print:border-gray-300">المستوى</th><th className="p-2 border-b print:border-gray-300">النطاق</th><th className="p-2 border-b print:border-gray-300">العدد</th><th className="p-2 border-b print:border-gray-300">النسبة</th></tr>

        const DataEntryView = ({ 
            data, maxScores, onUpdateData, onUpdateMaxScore, onRandomize, onReset, 
            totalScore, examTitle, setExamTitle, studentCount, onStudentCountChange,
            onExportJSON, onExportCSV, onImport, onOpenFileManager, stats
        }) => {
            const fileInputRef = useRef(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });

            const handleScoreChange = (studentId, questionIndex, value) => {
                const qKey = `q${questionIndex + 1}`;
                const maxScore = maxScores[questionIndex];
                if (maxScore === 0) return;

                if (maxScore === 1) {
                    if (value === '') { onUpdateData(studentId, qKey, 0); return; }
                    if (value !== '0' && value !== '1') return;
                    onUpdateData(studentId, qKey, parseInt(value));
                } else {
                    const parsedVal = parseFloat(value);
                    const newValue = isNaN(parsedVal) ? 0 : Math.min(Math.max(0, parsedVal), maxScore);
                    onUpdateData(studentId, qKey, newValue);
                }
            };

            const displayData = useMemo(() => {
                let filteredData = data.filter(student => student.name.includes(searchTerm));
                
                if (sortConfig.key) {
                    filteredData.sort((a, b) => {
                        let aVal, bVal;
                        if (sortConfig.key === 'name') {
                            aVal = a.name; bVal = b.name;
                        } else if (sortConfig.key === 'total') {
                            aVal = Array.from({ length: QUESTIONS_COUNT }, (_, i) => a[`q${i + 1}`]).reduce((sum, val) => sum + val, 0);
                            bVal = Array.from({ length: QUESTIONS_COUNT }, (_, i) => b[`q${i + 1}`]).reduce((sum, val) => sum + val, 0);
                        }
                        
                        if (aVal < bVal) return sortConfig.direction === 'asc' ? -1 : 1;
                        if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;
                        return 0;
                    });
                }
                return filteredData;
            }, [data, searchTerm, sortConfig]);

            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });

            return (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-[calc(100vh-220px)] animate-fade-in no-print-container">

                        <div className="flex-1 w-full lg:w-auto">
                            <div className="flex items-center gap-2 mb-2 group">
                                <input type="text" value={examTitle} onChange={(e) => setExamTitle(e.target.value)} className="font-bold text-slate-800 text-lg border-b border-dashed border-transparent hover:border-blue-400 focus:border-blue-600 focus:outline-none bg-transparent transition-colors w-full md:w-auto" placeholder="انقر هنا لكتابة اسم الاختبار أو الصف..." />
                                <Icons.PenLine className="w-4 h-4 text-slate-400 opacity-0 group-hover:opacity-100 transition-opacity" />
                            </div>
                            <div className="flex flex-wrap items-center gap-3">
                                <div className="relative">
                                    <input type="text" placeholder="بحث عن طالب..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="text-sm border border-slate-300 rounded-lg pl-3 pr-8 py-1.5 focus:outline-none focus:border-blue-500 w-48" />
                                    <div className="absolute right-2 top-2 text-slate-400"><Icons.Search /></div>
                                </div>
                                <div className="flex items-center gap-2 bg-slate-200 px-2 py-1.5 rounded-lg border border-slate-300">
                                    <Icons.Users className="w-4 h-4 text-slate-600" />
                                    <span className="text-xs font-bold text-slate-600">العدد:</span>
                                    <input type="number" min="1" max="200" value={studentCount} onChange={(e) => onStudentCountChange(parseInt(e.target.value) || 1)} className="w-12 bg-white text-center text-xs font-bold border border-slate-300 rounded focus:outline-none focus:border-blue-500" />
                                </div>
                                <div className="text-xs text-slate-600 bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100 flex gap-4">
                                    <span>المتوسط: <b>{stats.avgTotal}</b></span>
                                    <span>النجاح: <b className={stats.passRate >= 50 ? 'text-green-600' : 'text-red-600'}>{stats.passRate}%</b></span>
                                </div>
                            </div>
                        </div>
                        
                        <div className="flex flex-wrap items-center gap-2">
                            <button onClick={onOpenFileManager} className="flex items-center gap-2 px-3 py-1.5 text-sm text-white bg-slate-700 hover:bg-slate-800 rounded-lg transition-colors whitespace-nowrap"><Icons.Folder /> المحفوظات</button>
                            <button onClick={onExportCSV} className="flex items-center gap-2 px-3 py-1.5 text-sm text-green-700 bg-green-50 border border-green-200 hover:bg-green-100 rounded-lg transition-colors whitespace-nowrap" title="تصدير لملف Excel"><Icons.FileSpreadsheet /> Excel</button>
                            <button onClick={onExportJSON} className="flex items-center gap-2 px-3 py-1.5 text-sm text-slate-600 bg-slate-100 border border-slate-200 hover:bg-slate-200 rounded-lg transition-colors whitespace-nowrap" title="تصدير كملف احتياطي"><Icons.Download /> تصدير نسخة</button>
                            <input type="file" ref={fileInputRef} onChange={(e) => { if(e.target.files[0]) onImport(e.target.files[0]); e.target.value=null; }} accept=".json" className="hidden" />
                            <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-2 px-3 py-1.5 text-sm text-slate-600 bg-slate-100 border border-slate-200 hover:bg-slate-200 rounded-lg transition-colors whitespace-nowrap" title="استيراد ملف احتياطي"><Icons.Upload /> استيراد نسخة</button>
                            <button onClick={onReset} className="flex items-center gap-2 px-3 py-1.5 text-sm text-red-600 bg-red-50 border border-red-100 hover:bg-red-100 hover:border-red-200 rounded-lg transition-colors whitespace-nowrap"><Icons.Trash2 /> تصفير</button>
                            <button onClick={onRandomize} className="flex items-center gap-2 px-3 py-1.5 text-sm text-blue-600 bg-white border border-blue-200 hover:bg-blue-50 rounded-lg transition-colors whitespace-nowrap"><Icons.RefreshCw /> بيانات تجريبية</button>
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-auto">
                        <table className="w-full text-center border-collapse whitespace-nowrap">
                            <thead>
                                <tr>
                                    <th rowSpan="2" className="p-3 text-xs font-bold text-slate-600 border-b border-r thead-sticky-col-1 min-w-[40px]">#</th>
                                    <th rowSpan="2" className="p-3 text-xs font-bold text-slate-600 border-b thead-sticky-col-2 min-w-[160px] cursor-pointer hover:bg-slate-200" onClick={() => handleSort('name')}>
                                        <div className="flex items-center justify-between">اسم الطالب {sortConfig.key === 'name' && <Icons.SortAsc />}</div>
                                    </th>
                                    {Array.from({ length: QUESTIONS_COUNT }, (_, i) => (
                                        <th key={i} className={`p-2 text-xs font-bold border-b border-l min-w-[60px] ${maxScores[i] === 0 ? 'bg-slate-200 text-slate-400' : 'bg-blue-50/50 text-blue-700'}`}>م{i + 1}</th>
                                    ))}
                                    <th rowSpan="2" className="p-3 text-xs font-bold text-emerald-700 border-b border-r min-w-[80px] bg-emerald-50 cursor-pointer hover:bg-emerald-100" onClick={() => handleSort('total')}>
                                        <div className="flex items-center justify-center gap-1">المجموع {sortConfig.key === 'total' && <Icons.SortAsc />}</div>
                                    </th>
                                    <th rowSpan="2" className="p-3 text-xs font-bold text-purple-700 border-b min-w-[90px] bg-purple-50">المستوى</th>
                                </tr>
                                <tr>
                                    {maxScores.map((score, i) => (
                                        <th key={i} className={`p-1 border-b border-l ${score === 0 ? 'bg-slate-200' : 'bg-blue-100/50'}`}>
                                            <div className="flex flex-col items-center gap-1">
                                                <span className={`text-[10px] ${score === 0 ? 'text-slate-400' : 'text-slate-500'}`}>من</span>
                                                <input type="number" min="0" value={score} onChange={(e) => onUpdateMaxScore(i, e.target.value)} className={`w-10 text-center text-xs font-bold rounded px-1 py-0.5 outline-none border ${score === 0 ? 'bg-slate-100 text-slate-400 border-slate-300' : 'bg-white text-blue-800 border-blue-200 focus:ring-2 focus:ring-blue-400'}`} />
                                            </div>
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {displayData.map((student, index) => {
                                    const total = Array.from({ length: QUESTIONS_COUNT }, (_, i) => student[`q${i + 1}`]).reduce((a, b) => a + b, 0);
                                    const roundedTotal = Math.round(total * 100) / 100;
                                    const level = getGradeLevel(roundedTotal, totalScore);

                                    return (
                                        <tr key={student.id} className="hover:bg-blue-50/30 transition-colors group">
                                            <td className="p-2 text-xs font-mono text-slate-400 border-l border-slate-100 sticky-col-1">{index + 1}</td>
                                            <td className="p-1 border-l border-slate-100 sticky-col-2">
                                                <input type="text" value={student.name} onChange={(e) => onUpdateData(student.id, 'name', e.target.value)} className="w-full p-1 text-sm font-medium text-slate-700 text-right focus:outline-none focus:bg-blue-50 bg-transparent" />
                                            </td>
                                            {Array.from({ length: QUESTIONS_COUNT }, (_, i) => {
                                                const isDisabled = maxScores[i] === 0;
                                                const val = student[`q${i + 1}`];
                                                return (
                                                    <td key={i} className={`p-1 border-l border-slate-100 ${isDisabled ? 'bg-slate-50' : ''}`}>
                                                        <input type="text" inputMode={maxScores[i] === 1 ? "numeric" : "decimal"} disabled={isDisabled} value={val === 0 ? '' : val} placeholder={isDisabled ? '-' : '0'} onChange={(e) => handleScoreChange(student.id, i, e.target.value)} className={`w-full text-center p-1 rounded outline-none text-sm font-bold transition-all ${isDisabled ? 'bg-transparent text-slate-300 cursor-not-allowed' : val === maxScores[i] ? 'text-green-600 bg-green-50 focus:ring-2 focus:ring-green-400' : val === 0 ? 'text-slate-300 focus:ring-2 focus:ring-blue-500' : 'text-slate-700 bg-blue-50/10 focus:ring-2 focus:ring-blue-500'}`} />
                                                    </td>
                                                );
                                            })}
                                            <td className={`p-2 font-bold bg-emerald-50/30 border-r border-slate-100 ${roundedTotal > totalScore ? 'text-red-600' : 'text-emerald-700'}`}>{roundedTotal}</td>
                                            <td className="p-2 border-r border-slate-100"><span className={`px-2 py-1 rounded text-xs font-bold ${level.color}`}>{level.label}</span></td>
                                        </tr>
                                    );
                                })}
                                {displayData.length === 0 && (
                                    <tr><td colSpan={QUESTIONS_COUNT + 4} className="p-8 text-center text-slate-500">لا يوجد طلاب يطابقون البحث.</td></tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const FileManagerModal = ({ isOpen, onClose, savedFiles, onSave, onLoad, onDelete }) => {
            const [newFileName, setNewFileName] = useState("");
            if (!isOpen) return null;
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="bg-white rounded-lg shadow-xl w-full max-w-md p-6 m-4" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-4 border-b pb-2">
                            <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Icons.Folder /> إدارة الملفات المحفوظة</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-red-500"><Icons.X /></button>
                        </div>
                        <div className="mb-6">
                            <label className="block text-sm font-medium text-slate-700 mb-2">حفظ العمل الحالي باسم:</label>
                            <div className="flex gap-2">
                                <input type="text" className="border border-slate-300 rounded-lg px-3 py-2 w-full focus:outline-none focus:border-blue-500" placeholder="مثلاً: عاشر 1 - علوم" value={newFileName} onChange={(e) => setNewFileName(e.target.value)} />
                                <button onClick={() => { if(newFileName) { onSave(newFileName); setNewFileName(""); } }} className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors whitespace-nowrap">حفظ</button>
                            </div>
                        </div>
                        <div className="max-h-60 overflow-y-auto pr-2">
                            <h4 className="text-sm font-bold text-slate-600 mb-2">الملفات المحفوظة سابقاً:</h4>
                            {savedFiles.length === 0 ? <p className="text-sm text-slate-400 text-center py-4">لا توجد ملفات محفوظة.</p> : (
                                <ul className="space-y-2">{savedFiles.map(file => (
                                    <li key={file} className="flex justify-between items-center bg-slate-50 p-2 rounded border border-slate-100 hover:bg-slate-100">
                                        <span className="font-medium text-slate-700">{file}</span>
                                        <div className="flex gap-2">
                                            <button onClick={() => onLoad(file)} className="text-xs bg-green-100 text-green-700 px-2 py-1 rounded hover:bg-green-200">تحميل</button>
                                            <button onClick={() => onDelete(file)} className="text-xs bg-red-100 text-red-700 px-2 py-1 rounded hover:bg-red-200">حذف</button>
                                        </div>
                                    </li>
                                ))}</ul>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const AnalysisDashboard = ({ data, maxScores, totalScore, examTitle, formInputs, handleFormInputChange, handleFormItemChange, stats }) => {
            const generateReportText = () => {
                let text = `## 📊 التقرير التحليلي الشامل: ${examTitle}\n\n`;
                text += `### 1️⃣ نظرة عامة على الأداء:\n- **عدد الطلاب (الفعلي):** ${stats.actualStudentCount} طالب.\n- **عدد المفردات المحللة:** ${stats.activeQuestionsCount} مفردة.\n- **نسبة النجاح:** ${stats.passRate}%.\n- **نسبة الإتقان (75% فأكثر):** ${stats.masteryRate}%.\n- **المتوسط الحسابي:** ${stats.avgTotal} من ${totalScore}.\n`;
                let performance = "";
                if (stats.passRate >= 90) performance = "ممتاز"; else if (stats.passRate >= 75) performance = "جيد جداً"; else if (stats.passRate >= 60) performance = "جيد"; else if (stats.passRate >= 50) performance = "مقبول"; else performance = "ضعيف - يحتاج لتدخل عاجل";
                text += `- **التقدير العام للدفعة:** ${performance}.\n\n`;
                text += `### 2️⃣ تحليل تجانس المجموعة (التشتت):\n- **المدى:** تفاوتت الدرجات بين أدنى درجة **(${stats.minScore})** وأعلى درجة **(${stats.maxScore})**.\n- **الانحراف المعياري:** (${stats.stdDev}). `;
                const stdDevRatio = totalScore > 0 ? stats.stdDev / totalScore : 0;
                if (stdDevRatio < 0.15) text += "وهو مؤشر منخفض، يدل على أن مستويات الطلاب **متقاربة جداً (متجانسة)**.\n"; else if (stdDevRatio > 0.25) text += "وهو مؤشر مرتفع، يدل على وجود **فجوة كبيرة** وتفاوت حاد بين مستويات الطلاب (مجموعة غير متجانسة).\n"; else text += "وهو مؤشر متوسط، يدل على تباين طبيعي في المستويات.\n\n";
                text += `### 3️⃣ تحليل المفردات:\n`;
                const veryHard = stats.questionsAnalysis.filter(q => q.ease < 0.3 && q.status !== 'مستبعد');
                if (veryHard.length > 0) text += `- 🔴 **مفردات شديدة الصعوبة (< 30%):** \n  (${veryHard.map(q => q.question).join('، ')}).\n\n`;
                text += `### 4️⃣ التوصيات والمقترحات:\n`;
                if (stats.passRate < 50) text += `- ⚠️ نسبة النجاح متدنية. يجب مراجعة أساليب التدريس وتنفيذ حصص تقوية إلزامية.\n`;
                else if (veryHard.length > 3) text += `- 📝 يوصى بإعادة شرح الدروس المتعلقة بالأسئلة الصعبة (${veryHard.slice(0,3).map(q => q.question).join('، ')}).\n`;
                if (stdDevRatio > 0.25) text += `- 🤝 تفعيل استراتيجية "التعلم بالأقران" لتقليص الفجوة بين الطلاب.\n`;
                text += `- 🌟 تكريم الطلاب الحاصلين على تقدير ممتاز.\n`;
                return text;
            };

            return (
                <div className="space-y-6 animate-fade-in pb-10 print:space-y-4 print:pb-0">
                    <div className="hidden print:block text-center mb-8 border-b-2 border-slate-800 pb-4 print-break-avoid">
                        <h1 className="text-3xl font-bold text-slate-900">{examTitle}</h1>
                        <p className="text-slate-600 mt-2">تقرير التحليل الإحصائي لنتائج الطلاب</p>
                        <div className="flex justify-center gap-6 mt-4 text-sm text-slate-800 font-bold">
                            <span>عدد الطلاب (المحلل): {stats.actualStudentCount}</span>
                            <span>عدد المفردات: {stats.activeQuestionsCount}</span>
                            <span>الدرجة الكلية: {totalScore}</span>
                            <span>التاريخ: {new Date().toLocaleDateString('ar-EG')}</span>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 print:grid-cols-4 print-break-avoid">
                        <StatCard title="المتوسط الحسابي" value={stats.avgTotal} subtext={`من أصل ${totalScore}`} icon={Icons.TrendingUp} color="bg-blue-500" />
                        <StatCard title="نسبة الإتقان" value={`${stats.masteryRate}%`} subtext="الطلاب فوق 75%" icon={Icons.Star} color="bg-yellow-500" />
                        <StatCard title="المنوال (Mode)" value={stats.mode} subtext="الدرجة الأكثر تكراراً" icon={Icons.Award} color="bg-pink-500" />
                        <StatCard title="الانحراف المعياري" value={stats.stdDev} subtext="مقياس التشتت" icon={Icons.Sigma} color="bg-orange-500" />
                    </div>

                    <StatisticsTables stats={stats} totalScore={totalScore} />

                    <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 border-r-4 border-r-blue-600 print-break-avoid">
                        <div className="prose prose-slate max-w-none prose-p:my-1 prose-headings:mb-2 prose-headings:mt-4">
                        {generateReportText().split('\n').map((line, idx) => {
                            if (line.startsWith('## ')) return <h2 key={idx} className="text-2xl font-bold text-slate-900 pb-2 border-b">{line.replace('## ', '')}</h2>;
                            if (line.startsWith('### ')) return <h3 key={idx} className="text-lg font-bold text-blue-700 mt-4">{line.replace('### ', '')}</h3>;
                            if (line.startsWith('- ')) return <li key={idx} className="list-disc mr-4 text-slate-800">{line.replace('- ', '')}</li>;
                            return <p key={idx} className="text-slate-800 whitespace-pre-line">{line}</p>;
                        })}
                        </div>
                    </div>

                    <ItemAnalysisForm hardestQuestions={stats.hardestQuestions} formInputs={formInputs} handleInputChange={handleFormInputChange} handleItemChange={handleFormItemChange} />

                    {/* المفردات الأكثر صعوبة وسهولة (ترتيب عمودي في الطباعة لمنع التداخل) */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 print:grid-cols-1 print-break-avoid">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 chart-box">
                            <div className="flex items-center justify-between mb-4"><h3 className="text-lg font-bold text-slate-800 flex items-center gap-2 print:text-black"><Icons.ArrowDown /> المفردات الأكثر صعوبة</h3></div>
                            <div className="overflow-auto max-h-64 print:max-h-none">
                                <table className="w-full text-center text-sm"><thead className="bg-slate-50 text-slate-600"><tr><th className="p-2 border-b print:border-gray-300">الترتيب</th><th className="p-2 border-b print:border-gray-300">المفردة</th><th className="p-2 border-b print:border-gray-300">معامل السهولة</th></tr></thead><tbody>{stats.hardestQuestions.slice(0, 10).map((q, idx) => (<tr key={idx} className="border-b last:border-0 print:border-gray-300"><td className="p-2 font-bold text-slate-400 print:text-black">{idx + 1}</td><td className="p-2 font-bold text-slate-700 print:text-black">{q.question}</td><td className="p-2 text-red-600 font-bold print:text-black">{q.ease}</td></tr>))}{stats.hardestQuestions.length === 0 && (<tr><td colSpan="3" className="p-4 text-slate-400">لا توجد بيانات</td></tr>)}</tbody></table>
                            </div>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 chart-box">
                            <div className="flex items-center justify-between mb-4"><h3 className="text-lg font-bold text-slate-800 flex items-center gap-2 print:text-black"><Icons.ArrowUp /> المفردات الأكثر سهولة</h3></div>
                            <div className="overflow-auto max-h-64 print:max-h-none">
                                <table className="w-full text-center text-sm"><thead className="bg-slate-50 text-slate-600"><tr><th className="p-2 border-b print:border-gray-300">الترتيب</th><th className="p-2 border-b print:border-gray-300">المفردة</th><th className="p-2 border-b print:border-gray-300">معامل السهولة</th></tr></thead><tbody>{stats.easiestQuestions.map((q, idx) => (<tr key={idx} className="border-b last:border-0 print:border-gray-300"><td className="p-2 font-bold text-slate-400 print:text-black">{idx + 1}</td><td className="p-2 font-bold text-slate-700 print:text-black">{q.question}</td><td className="p-2 text-green-600 font-bold print:text-black">{q.ease}</td></tr>))}{stats.easiestQuestions.length === 0 && (<tr><td colSpan="3" className="p-4 text-slate-400">لا توجد بيانات</td></tr>)}</tbody></table>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 chart-box">
                        <div className="mb-6"><h3 className="text-lg font-bold text-slate-800 print:text-black">الرسم البياني لمعاملات السهولة</h3></div>
                        <div className="h-80 print:h-64">
                            <ResponsiveContainer width="100%" height="100%">
                            <AreaChart data={stats.questionsAnalysis} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                <defs><linearGradient id="colorEase" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#3B82F6" stopOpacity={0.8}/><stop offset="95%" stopColor="#3B82F6" stopOpacity={0}/></linearGradient></defs>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                <XAxis dataKey="question" />
                                <YAxis domain={[0, 1]} />
                                <Area type="monotone" dataKey="ease" name="معامل السهولة" stroke="#3B82F6" fillOpacity={1} fill="url(#colorEase)" />
                                <Area type="monotone" dataKey="difficulty" name="معامل الصعوبة" stroke="#EF4444" fill="none" strokeDasharray="5 5" />
                            </AreaChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                    
                    {/* الرسوم البيانية الأخرى (تم جعلها عمودية في الطباعة لمنع القص) */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 print:grid-cols-1 print-break-avoid">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 chart-box">
                            <h3 className="text-lg font-bold text-slate-800 mb-4 print:text-black">تكرار الدرجات (فئات)</h3>
                            <div className="h-72 print:h-80">
                                <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={stats.frequencyData} margin={{ top: 20, right: 10, left: -20, bottom: 0 }}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                    <XAxis dataKey="range" fontSize={12} tickMargin={10} />
                                    <YAxis allowDecimals={false} fontSize={12} />
                                    <Bar dataKey="count" name="عدد الطلاب" fill="#3B82F6" radius={[4, 4, 0, 0]} label={{ position: 'top', fill: '#475569', fontSize: 12 }}>
                                    {stats.frequencyData.map((entry, index) => (<Cell key={`cell-${index}`} fill={index % 2 === 0 ? '#3B82F6' : '#60A5FA'} />))}
                                    </Bar>
                                </BarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 chart-box">
                            <h3 className="text-lg font-bold text-slate-800 mb-4 print:text-black">توزيع المستويات</h3>
                            <div className="h-72 print:h-80">
                                <ResponsiveContainer width="100%" height="100%">
                                <PieChart margin={{ top: 10, right: 0, left: 0, bottom: 20 }}>
                                    {/* تصغير outerRadius إلى 80 ورفع cx للوسط لتجنب القص */}
                                    <Pie data={stats.levelData} cx="50%" cy="45%" innerRadius={50} outerRadius={80} paddingAngle={5} dataKey="value" label={({ name, percent }) => `${name} ${(percent * 100).toFixed(0)}%`}>
                                    {stats.levelData.map((entry, index) => (<Cell key={`cell-${index}`} fill={entry.color} />))}
                                    </Pie>
                                    <Legend verticalAlign="bottom" align="center" layout="horizontal" wrapperStyle={{ bottom: -10 }} />
                                </PieChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                    </div>

                    {/* NEW: Signatures Section */}
                    <div className="hidden print:block mt-8 pt-8 border-t border-gray-400 print-break-avoid">
                        <div className="flex justify-between items-center text-center text-sm font-bold">
                            <div className="w-1/3"><p className="mb-8">معلم المادة:</p><p>........................................</p></div>
                            <div className="w-1/3"><p className="mb-8">المشرف التربوي/المعلم الأول:</p><p>........................................</p></div>
                            <div className="w-1/3"><p className="mb-8">مدير المدرسة:</p><p>........................................</p></div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('entry'); 
            const [studentsCount, setStudentsCount] = useState(DEFAULT_STUDENTS_COUNT);
            const [isFileManagerOpen, setIsFileManagerOpen] = useState(false);
            
            const [savedFiles, setSavedFiles] = useState(() => { const files = localStorage.getItem('exam_analysis_saves'); return files ? JSON.parse(files) : {}; });
            const [studentsData, setStudentsData] = useState(() => { const savedData = localStorage.getItem('current_studentsData'); return savedData ? JSON.parse(savedData) : generateInitialData(DEFAULT_STUDENTS_COUNT); });
            const [maxScores, setMaxScores] = useState(() => { const savedScores = localStorage.getItem('current_maxScores'); return savedScores ? JSON.parse(savedScores) : initialMaxScores; });
            const [examTitle, setExamTitle] = useState(() => { return localStorage.getItem('current_examTitle') || "تحليل نتائج الاختبار"; });
            const [formInputs, setFormInputs] = useState(() => { const savedInputs = localStorage.getItem('current_formInputs'); return savedInputs ? JSON.parse(savedInputs) : { school: '', subject: '', grade: '', date: new Date().toLocaleDateString('ar-EG'), items: {} }; });

            useEffect(() => { localStorage.setItem('current_studentsData', JSON.stringify(studentsData)); }, [studentsData]);
            useEffect(() => { localStorage.setItem('current_maxScores', JSON.stringify(maxScores)); }, [maxScores]);
            useEffect(() => { localStorage.setItem('current_examTitle', examTitle); }, [examTitle]);
            useEffect(() => { localStorage.setItem('current_formInputs', JSON.stringify(formInputs)); }, [formInputs]);
            useEffect(() => { localStorage.setItem('exam_analysis_saves', JSON.stringify(savedFiles)); }, [savedFiles]);

            useEffect(() => {
                setStudentsData(prev => {
                    if (prev.length === studentsCount) return prev;
                    if (prev.length < studentsCount) {
                        const newStudents = Array.from({ length: studentsCount - prev.length }, (_, i) => {
                            const id = prev.length + i + 1;
                            const student = { id: id, name: `طالب ${id}` };
                            for (let q = 1; q <= QUESTIONS_COUNT; q++) { student[`q${q}`] = 0; }
                            return student;
                        });
                        return [...prev, ...newStudents];
                    } else { return prev.slice(0, studentsCount); }
                });
            }, [studentsCount]);

            const totalExamScore = useMemo(() => maxScores.reduce((a, b) => a + b, 0), [maxScores]);

            const stats = useMemo(() => {
                const activeStudents = studentsData.filter((s) => {
                    const total = Array.from({ length: QUESTIONS_COUNT }, (_, i) => s[`q${i + 1}`]).reduce((a, b) => a + b, 0);
                    return total > 0 || s.name !== `طالب ${s.id}`;
                });
                const analysisData = activeStudents.length > 0 ? activeStudents : [];
                const actualStudentCount = analysisData.length;
                const studentTotals = analysisData.map(s => {
                    const total = Array.from({ length: QUESTIONS_COUNT }, (_, i) => s[`q${i + 1}`]).reduce((a, b) => a + b, 0);
                    return { name: s.name, total: Math.round(total * 100) / 100, level: getGradeLevel(total, totalExamScore) };
                });
                const allTotals = studentTotals.map(s => s.total);
                const avgTotal = actualStudentCount > 0 ? parseFloat((allTotals.reduce((a, b) => a + b, 0) / actualStudentCount).toFixed(2)) : 0;
                const minScore = actualStudentCount > 0 ? Math.min(...allTotals) : 0;
                const maxScore = actualStudentCount > 0 ? Math.max(...allTotals) : 0;
                const passCount = studentTotals.filter(s => s.total >= (totalExamScore * 0.5)).length;
                const passRate = actualStudentCount > 0 ? ((passCount / actualStudentCount) * 100).toFixed(1) : 0;
                const masteryCount = studentTotals.filter(s => s.total >= (totalExamScore * 0.75)).length;
                const masteryRate = actualStudentCount > 0 ? ((masteryCount / actualStudentCount) * 100).toFixed(1) : 0;
                
                const questionsAnalysis = Array.from({ length: QUESTIONS_COUNT }, (_, i) => {
                    const qKey = `q${i + 1}`;
                    const qMaxScore = maxScores[i];
                    if (qMaxScore === 0) return { question: `م${i + 1}`, maxScore: 0, sum: 0, ease: 0, difficulty: 0, status: 'مستبعد' };
                    const sum = analysisData.map(s => s[qKey]).reduce((a, b) => a + b, 0);
                    const easeIndex = actualStudentCount > 0 ? parseFloat((sum / (actualStudentCount * qMaxScore)).toFixed(2)) : 0;
                    return { question: `م${i + 1}`, maxScore: qMaxScore, sum: Math.round(sum * 10) / 10, ease: easeIndex, difficulty: parseFloat((1 - easeIndex).toFixed(2)), status: easeIndex > 0.8 ? 'سهل جداً' : easeIndex > 0.6 ? 'سهل' : easeIndex < 0.25 ? 'صعب جداً' : easeIndex < 0.45 ? 'صعب' : 'متوسط' };
                });
                
                const activeQuestions = questionsAnalysis.filter(q => q.status !== 'مستبعد');
                const levelCounts = { 'ممتاز': 0, 'جيد جداً': 0, 'جيد': 0, 'مقبول': 0, 'راسب': 0 };
                studentTotals.forEach(s => levelCounts[s.level.label]++);

                return {
                    avgTotal, passRate, masteryRate, minScore, maxScore, actualStudentCount, activeQuestionsCount: activeQuestions.length,
                    median: calculateMedian(allTotals), mode: calculateMode(allTotals), stdDev: calculateStdDev(allTotals, avgTotal),
                    hardestQuestions: [...activeQuestions].sort((a, b) => a.ease - b.ease),
                    easiestQuestions: [...activeQuestions].sort((a, b) => b.ease - a.ease).slice(0, 10),
                    questionsAnalysis,
                    levelData: Object.keys(levelCounts).map(key => ({ name: key, value: levelCounts[key], color: getGradeLevel(key === 'ممتاز' ? totalExamScore * 0.9 : key === 'جيد جداً' ? totalExamScore * 0.8 : key === 'جيد' ? totalExamScore * 0.65 : key === 'مقبول' ? totalExamScore * 0.55 : 0, totalExamScore).chartColor })).filter(item => item.value > 0),
                    frequencyData: Array.from({ length: 5 }, (_, i) => {
                        const binSize = totalExamScore / 5;
                        const start = Math.round(i * binSize), end = Math.round((i + 1) * binSize);
                        return { range: `${start} - ${end}`, count: allTotals.filter(t => t >= start && (i === 4 ? t <= end : t < end)).length };
                    })
                };
            }, [studentsData, totalExamScore, maxScores]);


            const handleTotalScoreChange = (newTotal) => {
                const total = parseInt(newTotal);
                if (isNaN(total)) return;
                const newMaxScores = [...maxScores];
                for (let i = 0; i < QUESTIONS_COUNT; i++) { newMaxScores[i] = i < total ? 1 : 0; }
                setMaxScores(newMaxScores);
                setStudentsData(prev => prev.map(student => {
                    const newStudent = { ...student };
                    for (let i = 1; i <= QUESTIONS_COUNT; i++) {
                        if (newStudent[`q${i}`] > newMaxScores[i-1]) newStudent[`q${i}`] = newMaxScores[i-1];
                    }
                    return newStudent;
                }));
            };

            const handleExportCSV = () => {
                let csvContent = "\uFEFF"; 
                
                let headers = ["الرقم", "اسم الطالب"];
                maxScores.forEach((score, i) => { if(score > 0) headers.push(`م${i+1}`); });
                headers.push("المجموع", "المستوى");
                csvContent += headers.join(",") + "\n";

                studentsData.forEach((student, index) => {
                    let total = 0;
                    let row = [index + 1, student.name];
                    maxScores.forEach((score, i) => {
                        if(score > 0) {
                            row.push(student[`q${i+1}`]);
                            total += student[`q${i+1}`];
                        }
                    });
                    row.push(Math.round(total * 100) / 100);
                    row.push(getGradeLevel(total, totalExamScore).label);
                    csvContent += row.join(",") + "\n";
                });

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `${examTitle} - تصدير الدرجات.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleExportJSON = () => {
                const dataStr = JSON.stringify({ studentsData, maxScores, examTitle, studentsCount, formInputs });
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url; link.download = `exam-analysis-backup-${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const handleImport = (file) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (importedData.studentsData && importedData.maxScores) {
                            setStudentsData(importedData.studentsData); setMaxScores(importedData.maxScores);
                            if (importedData.examTitle) setExamTitle(importedData.examTitle);
                            if (importedData.studentsCount) setStudentsCount(importedData.studentsCount);
                            if (importedData.formInputs) setFormInputs(importedData.formInputs);
                            alert("تم استعادة البيانات بنجاح!");
                        } else { alert("الملف غير صالح."); }
                    } catch (error) { alert("حدث خطأ أثناء قراءة الملف."); }
                };
                reader.readAsText(file);
            };

            const handleSaveFile = (fileName) => { setSavedFiles(prev => ({ ...prev, [fileName]: { studentsData, maxScores, examTitle, studentsCount, formInputs } })); alert(`تم حفظ "${fileName}" بنجاح.`); setIsFileManagerOpen(false); };
            const handleLoadFile = (fileName) => { const f = savedFiles[fileName]; if (f) { setStudentsData(f.studentsData); setMaxScores(f.maxScores); setExamTitle(f.examTitle); setStudentsCount(f.studentsCount || DEFAULT_STUDENTS_COUNT); setFormInputs(f.formInputs || { school: '', subject: '', grade: '', date: new Date().toLocaleDateString('ar-EG'), items: {} }); alert(`تم تحميل "${fileName}".`); setIsFileManagerOpen(false); } };
            const handleDeleteFile = (fileName) => { if (confirm(`حذف "${fileName}"؟`)) setSavedFiles(prev => { const n = { ...prev }; delete n[fileName]; return n; }); };
            const handleUpdateData = (id, key, value) => setStudentsData(prev => prev.map(s => s.id === id ? { ...s, [key]: value } : s));
            const handleUpdateMaxScore = (idx, value) => { const n = [...maxScores]; n[idx] = Math.max(0, parseFloat(value) || 0); setMaxScores(n); const qKey = `q${idx + 1}`; setStudentsData(prev => prev.map(s => s[qKey] > n[idx] ? { ...s, [qKey]: n[idx] } : s)); };
            const handleResetData = () => { if (window.confirm("متأكد من تصفير الدرجات؟")) setStudentsData(prev => prev.map(s => { const n = { ...s }; for (let i = 1; i <= QUESTIONS_COUNT; i++) n[`q${i}`] = 0; return n; })); };
            const handleRandomize = () => setStudentsData(prev => prev.map(s => { const n = { ...s }; const p = Math.random(); for (let i = 1; i <= QUESTIONS_COUNT; i++) { if (maxScores[i-1] === 0) { n[`q${i}`] = 0; continue; } n[`q${i}`] = Math.min(Math.round(((p * 0.7) + (Math.random() * 0.3)) * maxScores[i-1]), maxScores[i-1]); } return n; }));

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-right" dir="rtl">
                    <header className="bg-slate-900 text-white p-4 shadow-lg sticky top-0 z-40 no-print">
                        <div className="max-w-[95%] mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3 w-full md:w-auto">
                                <div className="bg-blue-600 p-2 rounded-lg"><Icons.Calculator /></div>
                                <div><h1 className="text-xl font-bold">نظام تحليل الاختبارات</h1><p className="text-xs text-slate-400">إصدار مطور | أ.عبدالله الرواحي</p></div>
                            </div>
                            <div className="flex flex-wrap items-center gap-4 justify-end">
                                <div className="flex items-center gap-2 bg-slate-800 p-1.5 rounded-lg border border-slate-700">
                                    <span className="text-xs text-slate-400 pl-2">الدرجة الكلية:</span>
                                    <select onChange={(e) => handleTotalScoreChange(e.target.value)} className="bg-slate-900 text-white text-sm font-bold rounded p-1 outline-none cursor-pointer" defaultValue="">
                                        <option value="" disabled>تخصيص سريع...</option><option value="60">60 درجة</option><option value="40">40 درجة</option><option value="30">30 درجة</option><option value="20">20 درجة</option><option value="10">10 درجات</option>
                                    </select>
                                </div>
                                <div className="bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 flex items-center gap-2">
                                    <span className="text-xs text-slate-400">المجموع الحالي:</span><span className="font-bold text-white text-lg">{totalExamScore}</span>
                                </div>
                                <div className="flex bg-slate-800 p-1 rounded-lg">
                                    <button onClick={() => setActiveTab('entry')} className={`flex items-center gap-2 px-4 py-2 rounded-md text-sm transition-all ${activeTab === 'entry' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-white'}`}><Icons.Table /> إدخال</button>
                                    <button onClick={() => setActiveTab('analysis')} className={`flex items-center gap-2 px-4 py-2 rounded-md text-sm transition-all ${activeTab === 'analysis' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-white'}`}><Icons.FileText /> تقرير</button>
                                </div>
                                {activeTab === 'analysis' && <button onClick={() => window.print()} className="bg-emerald-600 hover:bg-emerald-700 px-4 py-2 rounded-lg flex items-center gap-2"><Icons.Printer /> طباعة</button>}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[95%] mx-auto p-4 md:p-6 print:p-0 print:max-w-none">
                        {activeTab === 'entry' ? (
                            <DataEntryView 
                                data={studentsData} maxScores={maxScores} onUpdateData={handleUpdateData} onUpdateMaxScore={handleUpdateMaxScore} 
                                onRandomize={handleRandomize} onReset={handleResetData} totalScore={totalExamScore} examTitle={examTitle} 
                                setExamTitle={setExamTitle} studentCount={studentsCount} onStudentCountChange={setStudentsCount} 
                                onExportJSON={handleExportJSON} onExportCSV={handleExportCSV} onImport={handleImport} 
                                onOpenFileManager={() => setIsFileManagerOpen(true)} stats={stats}
                            />
                        ) : (
                            <AnalysisDashboard 
                                data={studentsData} maxScores={maxScores} totalScore={totalExamScore} examTitle={examTitle} 
                                formInputs={formInputs} handleFormInputChange={(e, f) => setFormInputs(p => ({...p, [f]: e.target.value}))} 
                                handleFormItemChange={(q, f, v) => setFormInputs(p => ({...p, items: {...p.items, [q]: {...(p.items[q]||{}), [f]: v}}}))} stats={stats}
                            />
                        )}
                    </main>

                    <FileManagerModal isOpen={isFileManagerOpen} onClose={() => setIsFileManagerOpen(false)} savedFiles={Object.keys(savedFiles)} onSave={handleSaveFile} onLoad={handleLoadFile} onDelete={handleDeleteFile} />

                    <footer className="bg-slate-900 border-t border-slate-800 p-4 mt-auto no-print">
                        <div className="max-w-[95%] mx-auto flex flex-col md:flex-row justify-between items-center gap-4 text-sm text-slate-400">
                            <div><span>تصميم وتطوير: </span><span className="font-bold text-white">أ.عبدالله بن خلف الرواحي</span> <span className="mx-2">|</span> <span>بإشراف: </span><span className="font-bold text-white">أ. ناصر العبري</span></div>
                            <div className="text-xs">جميع الحقوق محفوظة © {new Date().getFullYear()}</div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
